name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (test + bootJar)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test + BootJar
        run: ./gradlew --no-daemon clean test bootJar

      - name: Prepare dist/app.jar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BOOT_JAR="$(ls -1 build/libs/*.jar | grep -v 'plain' | head -n 1)"
          echo "Boot jar: ${BOOT_JAR}"
          cp "${BOOT_JAR}" dist/app.jar
          ls -al dist

      - name: Upload app.jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmib-app-jar
          path: dist/app.jar
          if-no-files-found: error
          retention-days: 7

  docker-build:
    name: Docker Build Validation (arm64, thin)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download app.jar artifact
        uses: actions/download-artifact@v4
        with:
          name: dmib-app-jar
          path: dist

      - name: Verify dist
        run: ls -al dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (arm64 validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci
          platforms: linux/arm64
          push: false
          provenance: false
